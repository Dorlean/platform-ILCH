<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initialisation Cycles — ILCH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0D2B4E;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{background:#fff;max-width:750px;width:100%;padding:2rem;border-radius:4px}
    h1{font-size:1.3rem;color:#0D2B4E;margin-bottom:0.5rem}
    p{font-size:13px;color:#6B7280;margin-bottom:1.5rem}
    .btn{background:#C9A96E;color:#0D2B4E;border:none;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-bottom:10px}
    .btn-back{background:#0D2B4E;color:#fff}
    .log{background:#0D2B4E;color:#C9A96E;padding:1rem;font-family:monospace;font-size:12px;height:350px;overflow-y:auto;margin-top:1rem}
    .log-line{padding:2px 0}
    .log-line.ok{color:#4ADE80}
    .log-line.err{color:#F87171}
    .progress{height:6px;background:#E5E7EB;margin-bottom:1rem}
    .progress-bar{height:100%;background:#C9A96E;width:0%;transition:width 0.3s}
    .cycles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
    .cycle-card{padding:12px;border:2px solid;text-align:center;font-size:12px;font-weight:600}
    .success{background:#F0FDF4;border:1px solid #BBF7D0;padding:12px;font-size:13px;color:#16A34A;display:none;margin-top:1rem;text-align:center;font-weight:600}
  </style>
</head>
<body>
<div class="card">
  <h1>🏫 Initialisation des Cycles ILCH</h1>
  <p>Ce script crée les matières et structures par cycle dans Firebase.</p>

  <div class="cycles">
    <div class="cycle-card" style="border-color:#8B5CF6;color:#8B5CF6">🌱 Préscolaire</div>
    <div class="cycle-card" style="border-color:#2563EB;color:#2563EB">📚 1er Cycle</div>
    <div class="cycle-card" style="border-color:#16A34A;color:#16A34A">📖 2ème Cycle</div>
    <div class="cycle-card" style="border-color:#D97706;color:#D97706">🎓 3ème Cycle</div>
    <div class="cycle-card" style="border-color:#DC2626;color:#DC2626">🏫 Secondaire</div>
    <div class="cycle-card" style="border-color:#0D9488;color:#0D9488">⏰ Emplois du temps</div>
  </div>

  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <button class="btn" id="init-btn" onclick="initCycles()">▶ Initialiser les cycles</button>
  <button class="btn btn-back" onclick="window.location.href='login.html'">← Retour</button>
  <div class="log" id="log"></div>
  <div class="success" id="success">✅ Cycles initialisés ! <a href="login.html" style="color:#16A34A;font-weight:700">Retour à la connexion</a></div>
</div>

<script type="module">

import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjrBnsTu7CNWnqeqSm29-arbs8MPoTBJ0",
  authDomain: "ilch-plateforme.firebaseapp.com",
  projectId: "ilch-plateforme",
  storageBucket: "ilch-plateforme.firebasestorage.app",
  messagingSenderId: "978336467476",
  appId: "1:978336467476:web:1f716ca406469a0c62b501"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Matières par cycle ─────────────────────────────────────
const MATIERES = {

    { nom: 'Numération', cycle: 'prescolaire', classes: ['Préscolaire'], coeff: 2 },
    { nom: 'Expression artistique', cycle: 'prescolaire', classes: ['Préscolaire'], coeff: 1 },

  ],

    { nom: 'Mathématiques', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 3 },

    { nom: 'Sciences naturelles', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 2 },
    { nom: 'Sciences sociales', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 2 },
    { nom: 'Éducation physique', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 1 },
    { nom: 'Arts plastiques', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 1 },
    { nom: 'Religion/Moral', cycle: 'cycle1', classes: ['1ère Fondamentale','2ème Fondamentale','3ème Fondamentale'], coeff: 1 },
  ],
  cycle2: [
    { nom: 'Français', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 3 },
    { nom: 'Mathématiques', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 3 },
    { nom: 'Créole haïtien', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 2 },
    { nom: 'Sciences naturelles', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 2 },
    { nom: 'Sciences sociales', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 2 },
    { nom: 'Anglais', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 2 },
    { nom: 'Espagnol', cycle: 'cycle2', classes: ['5ème Fondamentale','6ème Fondamentale'], coeff: 1 },
    { nom: 'Éducation physique', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 1 },
    { nom: 'Religion/Moral', cycle: 'cycle2', classes: ['4ème Fondamentale','5ème Fondamentale','6ème Fondamentale'], coeff: 1 },
  ],
  cycle3: [
    { nom: 'Français', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 3 },
    { nom: 'Mathématiques', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 3 },
    { nom: 'Créole haïtien', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 2 },
    { nom: 'Sciences naturelles', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 2 },
    { nom: 'Sciences sociales', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 2 },

    { nom: 'Informatique', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 1 },
    { nom: 'Éducation physique', cycle: 'cycle3', classes: ['7ème Fondamentale','8ème Fondamentale','9ème Fondamentale'], coeff: 1 },
  ],
  secondaire: [
    { nom: 'Français', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 4 },
    { nom: 'Mathématiques', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 4 },
    { nom: 'Philosophie', cycle: 'secondaire', classes: ['NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 3 },

    { nom: 'Sciences naturelles', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 3 },
    { nom: 'Anglais', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 3 },
    { nom: 'Espagnol', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 2 },
    { nom: 'Informatique', cycle: 'secondaire', classes: ['NSI','NSII','NSIII','NSIV','Rhétorique','Terminale A','Terminale B'], coeff: 2 },

};

// ── Emplois du temps par cycle ─────────────────────────────
const JOURS = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
const HEURES = ['7h00-8h00', '8h00-9h00', '9h00-10h00', '10h00-11h00', '11h00-12h00', '13h00-14h00', '14h00-15h00', '15h00-16h00'];

const EDT_EXEMPLE = {
  '1ère Fondamentale': [
    { jour: 'Lundi', heure: '7h00-8h00', matiere: 'Français', prof: '' },
    { jour: 'Lundi', heure: '8h00-9h00', matiere: 'Mathématiques', prof: '' },
    { jour: 'Lundi', heure: '9h00-10h00', matiere: 'Créole haïtien', prof: '' },
    { jour: 'Lundi', heure: '10h00-11h00', matiere: 'Sciences naturelles', prof: '' },
    { jour: 'Mardi', heure: '7h00-8h00', matiere: 'Mathématiques', prof: '' },
    { jour: 'Mardi', heure: '8h00-9h00', matiere: 'Français', prof: '' },
    { jour: 'Mardi', heure: '9h00-10h00', matiere: 'Sciences sociales', prof: '' },
    { jour: 'Mercredi', heure: '7h00-8h00', matiere: 'Français', prof: '' },
    { jour: 'Mercredi', heure: '8h00-9h00', matiere: 'Éducation physique', prof: '' },
    { jour: 'Jeudi', heure: '7h00-8h00', matiere: 'Mathématiques', prof: '' },
    { jour: 'Jeudi', heure: '8h00-9h00', matiere: 'Arts plastiques', prof: '' },
    { jour: 'Vendredi', heure: '7h00-8h00', matiere: 'Religion/Moral', prof: '' },
    { jour: 'Vendredi', heure: '8h00-9h00', matiere: 'Français', prof: '' },
  ],
};

function log(msg, type='info') {
  var div = document.getElementById('log');
  var line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = new Date().toLocaleTimeString('fr-FR') + ' — ' + msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}

window.initCycles = async function() {
  var btn = document.getElementById('init-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Initialisation en cours...';

  log('🚀 Démarrage initialisation des cycles ILCH...');

  try {
    // 1. Créer les matières par cycle
    var totalMatieres = 0;
    for (var cycle in MATIERES) {
      log('📚 Création matières ' + cycle + '...');
      for (var mat of MATIERES[cycle]) {
        await addDoc(collection(db, 'matieres'), {
          ...mat,
          createdAt: new Date().toISOString()
        });
        totalMatieres++;
      }
      setProgress(20 + Object.keys(MATIERES).indexOf(cycle) * 10);
    }
    log('✅ ' + totalMatieres + ' matières créées', 'ok');
    setProgress(70);

    // 2. Créer emploi du temps exemple
    log('⏰ Création emplois du temps exemples...');
    var totalEdt = 0;
    for (var classe in EDT_EXEMPLE) {
      for (var seance of EDT_EXEMPLE[classe]) {
        await addDoc(collection(db, 'emploisdutemps'), {
          ...seance,
          classe: classe,
          cycle: 'cycle1',
          annee: '2025-2026',
          createdAt: new Date().toISOString()
        });
        totalEdt++;
      }
    }
    log('✅ ' + totalEdt + ' séances d\'emploi du temps créées', 'ok');
    setProgress(90);

    // 3. Créer structure cycles
    for (var cycleId in MATIERES) {
      var cycleNames = {
        prescolaire: 'Préscolaire',
        cycle1: '1er Cycle Fondamental',
        cycle2: '2ème Cycle Fondamental',
        cycle3: '3ème Cycle Fondamental',
        secondaire: 'Secondaire'
      };
      await addDoc(collection(db, 'cycles'), {
        id: cycleId,
        nom: cycleNames[cycleId],
        createdAt: new Date().toISOString()
      });
    }
    log('✅ 5 cycles créés', 'ok');
    setProgress(100);

    log('', 'info');
    log('════════════════════════════════════════', 'info');
    log('🎉 INITIALISATION TERMINÉE !', 'ok');
    log('✅ Matières créées par cycle', 'ok');
    log('✅ Emplois du temps créés', 'ok');
    log('✅ Structure cycles configurée', 'ok');

    document.getElementById('success').style.display = 'block';
    btn.textContent = '✅ Terminé !';

  } catch(e) {
    log('❌ Erreur : ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '▶ Réessayer';
  }
};
</script>
</body>
</html>
